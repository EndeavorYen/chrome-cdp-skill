<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>chrome-cdp-ex long-session smoke</title>
  <style>
    :root { font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif; color: #102133; }
    body { margin: 0; min-height: 2400px; background: #f7fafc; }
    main { max-width: 760px; padding: 32px; }
    .sidebar { position: fixed; right: 24px; top: 96px; width: 220px; padding: 16px; background: #0f172a; color: white; border-radius: 12px; }
    .sticky-tools { position: sticky; top: 0; padding: 8px; background: #e0f2fe; border-bottom: 1px solid #7dd3fc; }
    button, input { font: inherit; padding: 8px 12px; margin: 4px; }
    #combat-log { border: 1px solid #cbd5e1; background: white; height: 320px; overflow: auto; padding: 12px; }
    #custom-clickable { cursor: pointer; display: inline-block; padding: 8px 12px; background: #fde68a; border-radius: 8px; }
    [role="dialog"] { position: fixed; inset: 20% auto auto 50%; transform: translateX(-50%); background: white; border: 2px solid #0f172a; padding: 20px; z-index: 20; box-shadow: 0 20px 60px #0005; }
    [hidden] { display: none !important; }
    /*# sourceURL=/tmp/chrome-cdp-ex-smoke.css */
  </style>
</head>
<body>
  <div class="sticky-tools">Sticky toolbar for coordinate annotation</div>
  <main role="main">
    <h1>chrome-cdp-ex long-session smoke</h1>
    <p>This page simulates 3y-Mud-style logs, modal dismissal, fixed controls, and keyboard shortcuts.</p>
    <input id="cmd" aria-label="command input" placeholder="look 訓練師">
    <button id="combat">Run combat</button>
    <div id="custom-clickable" onclick="appendLog('custom clickable used')">Custom clickable div</div>
    <section role="region" aria-label="事件紀錄">
      <h2>事件紀錄</h2>
      <div id="combat-log"></div>
    </section>
  </main>
  <aside class="sidebar">
    <button id="character">角色 (C)</button>
    <p id="shortcut-status">shortcut:none</p>
  </aside>
  <div role="dialog" aria-modal="true" aria-label="MOTD" id="motd">
    <p>按任意鍵繼續 — smoke modal</p>
    <button aria-label="關閉" id="close-modal">關閉</button>
  </div>
  <script>
    const log = document.getElementById('combat-log');
    function appendLog(text) {
      const p = document.createElement('p');
      p.textContent = text;
      log.appendChild(p);
      log.scrollTop = log.scrollHeight;
    }
    for (let i = 1; i <= 120; i++) appendLog('歷史訊息 #' + i);
    document.getElementById('combat').addEventListener('click', () => {
      appendLog('戰鬥開始');
      setTimeout(() => appendLog('第 1 回合'), 120);
      setTimeout(() => appendLog('戰鬥勝利'), 260);
      console.log('combat complete');
    });
    document.getElementById('close-modal').addEventListener('click', () => {
      document.getElementById('motd').hidden = true;
      appendLog('modal dismissed');
    });
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'c') document.getElementById('shortcut-status').textContent = 'shortcut:c';
    });
  </script>
</body>
</html>
