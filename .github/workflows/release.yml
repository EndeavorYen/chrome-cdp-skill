name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-and-deploy
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm

      - name: Check if release needed
        id: check
        run: |
          CURRENT="v$(node -p 'require("./package.json").version')"
          if git rev-parse "$CURRENT" >/dev/null 2>&1; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure git
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump version and generate changelog
        if: steps.check.outputs.needed == 'true'
        run: npx commit-and-tag-version

      - name: Push release commit and tag
        if: steps.check.outputs.needed == 'true'
        run: git push --follow-tags

      - name: Extract changelog and create release
        if: steps.check.outputs.needed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          VER="${TAG#v}"
          # Extract section between this version heading and the next
          BODY=$(awk "/^## \\[?${VER}\\]?/{found=1; next} /^## /{if(found) exit} found{print}" CHANGELOG.md)
          echo "$BODY" > /tmp/release-notes.md
          gh release create "$TAG" --notes-file /tmp/release-notes.md --title "$TAG"
